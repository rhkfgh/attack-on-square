<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>진격의 거인: 방어전 FINAL (Large Edition)</title>
    <style>
        :root { --main-red: #8b0000; --gold: #ffd700; }
        
        /* 📱 화면 고정 및 스크롤 방지 */
        html, body { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            overflow: hidden; margin: 0; padding: 0; background: #000; color: #eee;
            font-family: 'Noto Sans KR', sans-serif; touch-action: none;
        }

        #main-wrapper { 
            display: none; flex-direction: column; width: 100%; max-width: 500px; 
            height: 100dvh; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
        }

        /* 입력창 위치 최적화 */
        #ui-panel { width: 100%; padding: 12px; background: #222; display: flex; flex-direction: column; align-items: center; z-index: 20; }
        .ui-top { border-bottom: 2px solid var(--main-red); order: 1; }
        .ui-bottom { border-top: 2px solid var(--main-red); order: 3; }
        
        #game-area { order: 2; position: relative; width: 100%; flex: 1; background: #111 url('background.png') no-repeat center center; background-size: cover; overflow: hidden; }
        #wall-area { order: 2; width: 100%; height: 60px; background: url('wall.png') repeat-x center bottom; background-size: contain; position: absolute; bottom: 0; z-index: 10; border-top: 2px solid #444; }

        #input-box { width: 90%; padding: 12px; font-size: 18px; border: 2px solid var(--main-red); background: #111; color: #fff; text-align: center; border-radius: 8px; outline: none; }
        .status-bar { display: flex; justify-content: space-between; width: 90%; margin-top: 5px; font-size: 13px; color: #ccc; }
        
        /* 👹 거인 크기 2배 확대 (90x130) */
        .titan-container { position: absolute; display: flex; flex-direction: column; align-items: center; z-index: 5; pointer-events: none; }
        .titan-img { width: 90px; height: 130px; object-fit: contain; }
        .word-label { font-size: 16px; font-weight: 900; color: #fff; background: rgba(139, 0, 0, 0.9); padding: 3px 8px; border-radius: 4px; white-space: nowrap; box-shadow: 0 4px 8px rgba(0,0,0,0.6); position: relative; top: -10px; }
        
        /* 화면 UI */
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; padding: 20px; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: var(--main-red); color: white; border: none; border-radius: 8px; margin: 8px; font-weight: bold; width: 80%; max-width: 250px; }
        .device-select-btn { background: #333; border: 2px solid transparent; }
        .device-select-btn.active { border-color: var(--gold); background: var(--main-red); }

        #ranking-board { background: rgba(255,255,255,0.05); width: 100%; max-width: 300px; max-height: 200px; overflow-y: auto; margin: 10px 0; padding: 10px; border: 1px solid var(--main-red); display: none; }
        .progress-container { width: 100%; height: 20px; background: #333; border-radius: 10px; overflow: hidden; margin: 10px 0; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, var(--main-red), #ff4d4d); width: 0%; transition: width 1s; display: flex; align-items: center; justify-content: center; font-size: 11px; color: white; }
    </style>
</head>
<body>

    <audio id="audio-battle" src="battle.mp3" loop></audio>
    <audio id="audio-boom" src="boom.mp3"></audio>
    <audio id="audio-kill" src="kill.mp3"></audio>
    <audio id="audio-ending" src="ending.mp3" loop></audio>

    <div id="start-screen" class="screen">
        <h1 style="color:var(--main-red);">🏹 이세계 광장<br>방어전</h1>
        <p id="event-info" style="font-size:12px; color:#888; margin-bottom:20px;">거인이 침략했다. 적들을 물리치고 위험에 빠진 광장을 구해라!</p>
        
        <div style="margin-bottom: 20px;">
            <button class="device-select-btn" id="btn-pc" onclick="setDevice('pc')">💻 PC 모드</button>
            <button class="device-select-btn" id="btn-mobile" onclick="setDevice('mobile')">📱 모바일 모드</button>
        </div>

        <input type="text" id="nickname" style="padding:15px; width:80%; margin-bottom:15px; text-align:center; border-radius:8px; border:none; font-size:16px;" placeholder="병사 이름 입력" maxlength="10">
        <button id="start-btn" onclick="startGame()" disabled>기기를 선택해주세요</button>
    </div>

    <div id="main-wrapper">
        <div id="ui-panel">
            <input type="text" id="input-box" placeholder="단어 입력..." autocomplete="off" enterkeyhint="done">
            <div class="status-bar">
                <span>🛡️ HP <span id="hp">100</span>%</span>
                <span style="color:var(--gold);">⭐ STG <span id="stage">1</span></span>
                <span>⚔️ SCORE <span id="score">0</span></span>
            </div>
        </div>
        <div id="game-area"><div id="wall-area"></div></div>
    </div>

    <div id="end-screen" class="screen" style="display:none;">
        <h1 id="result-title">작전 실패</h1>
        <p id="final-stats" style="white-space:pre-line;"></p>
        <div class="progress-container"><div id="total-progress" class="progress-bar">0%</div></div>
        <div id="ranking-board"><div id="ranking-list" style="text-align:left; font-size:14px;"></div></div>
        <button id="btn-rank" onclick="fetchAndShowRanking()">🏆 실시간 랭킹 확인</button>
        <button onclick="location.reload()">다시 작전 개시</button>
    </div>

    <script>
        // ⚙️ 핵심 설정 (URL 입력 필수!)
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbynIsqU2LlIqTHTrRfYZtAO6SE4OsD1FukzIdIPNneuym1meYZqAuUc33mivpzLJI6Z/exec"; 
        const TOTAL_GOAL = 100000; 

        // 📈 초기 속도 상향 조정 (fallSpeed 1.0, spawnRate 1600ms)
        let words = [], score = 0, hp = 100, stage = 1, nickname = "", gameActive = false, deviceType = "";
        let fallSpeed = 1.0, spawnRate = 1600, spawnTimer;

        const bgm = document.getElementById('audio-battle'), sfxKill = document.getElementById('audio-kill'), sfxBoom = document.getElementById('audio-boom'), sfxEnding = document.getElementById('audio-ending'), inputBox = document.getElementById('input-box');

        sfxKill.volume = 0.35; sfxBoom.volume = 0.5; bgm.volume = 0.4;

        function setDevice(type) {
            deviceType = type;
            document.querySelectorAll('.device-select-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + type).classList.add('active');
            document.getElementById('start-btn').disabled = false;
            document.getElementById('start-btn').innerText = "작전 개시";
            document.getElementById('ui-panel').className = (type === 'mobile') ? 'ui-top' : 'ui-bottom';
        }

        window.onload = async () => {
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                document.getElementById('event-info').innerText = `인류 총 공헌도: ${data.total}pt / 목표: ${TOTAL_GOAL}pt`;
            } catch(e) { document.getElementById('event-info').innerText = "데이터 연결 준비 중..."; }
        };

        async function startGame() {
            nickname = document.getElementById('nickname').value.trim();
            if (!nickname) return alert("병사의 이름을 입력하세요!");
            
            const defaultWords = ["에렌", "미카사", "리바이", "조사병단", "진격", "거인", "입체기동", "방벽"];
            try { 
                const res = await fetch('words.txt'); 
                const text = await res.text(); 
                const loaded = text.split('\n').map(v => v.trim()).filter(v => v.length > 0);
                words = loaded.length > 0 ? loaded : defaultWords;
            } catch (e) { words = defaultWords; }
            
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('main-wrapper').style.display = 'flex';
            gameActive = true; bgm.play(); spawnTimer = setInterval(createTitan, spawnRate); inputBox.focus();
        }

        function createTitan() {
            if (!gameActive) return;
            const word = words[Math.floor(Math.random() * words.length)];
            const container = document.createElement('div');
            container.className = 'titan-container';
            container.innerHTML = `<img src="titan.png" class="titan-img"><div class="word-label">${word}</div>`;
            const gameArea = document.getElementById('game-area');
            
            // ⭐ 거인 가로 크기(90px)를 고려한 좌우 범위 조정
            container.style.left = Math.random() * (gameArea.clientWidth - 110) + 'px';
            container.style.top = '-150px';
            gameArea.appendChild(container);

            let topPos = -150;
            const move = setInterval(() => {
                if (!gameActive) return;
                topPos += fallSpeed; container.style.top = topPos + 'px';
                
                // ⭐ 거인 키(130px)를 고려한 충돌 시점 조정 (성벽 높이 감안)
                if (topPos > gameArea.clientHeight - 80) {
                    clearInterval(move); container.remove();
                    const boomClone = sfxBoom.cloneNode(); boomClone.volume = sfxBoom.volume; boomClone.play();
                    
                    // 🛡️ 피격 시 HP 25 감소
                    hp -= 25; 
                    document.getElementById('hp').innerText = Math.max(0, hp);
                    if (hp <= 0) endGame();
                }
            }, 20);
            container.dataset.word = word; container.dataset.intervalId = move;
        }

        inputBox.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                if (deviceType === 'mobile') e.preventDefault(); 
                const val = inputBox.value.trim();
                document.querySelectorAll('.titan-container').forEach(t => {
                    if (t.dataset.word === val) {
                        clearInterval(t.dataset.intervalId); t.remove();
                        const kClone = sfxKill.cloneNode(); kClone.volume = sfxKill.volume; kClone.play();
                        
                        // ⚔️ 마리당 100점 증가
                        score += 100; 
                        document.getElementById('score').innerText = score;
                        checkStage();
                    }
                });
                inputBox.value = '';
                if (deviceType === 'mobile') { inputBox.blur(); setTimeout(() => { if(gameActive) inputBox.focus(); }, 25); }
            }
        });

        // 📉 1500점마다 스테이지 업 & 가속
        function checkStage() {
            let newStage = Math.floor(score / 1500) + 1;
            if (newStage > stage) {
                stage = newStage; 
                fallSpeed += 0.35; 
                spawnRate = Math.max(600, spawnRate - 200);
                bgm.playbackRate = Math.min(1.8, 1 + (stage-1)*0.05);
                document.getElementById('stage').innerText = stage;
                clearInterval(spawnTimer); spawnTimer = setInterval(createTitan, spawnRate);
            }
        }

        async function endGame() {
            gameActive = false; clearInterval(spawnTimer); bgm.pause(); sfxEnding.play();
            document.getElementById('main-wrapper').style.display = 'none';
            document.getElementById('end-screen').style.display = 'flex';
            document.getElementById('final-stats').innerText = `${nickname} 병사 전적: ${score}pt\n보고 전송 중...`;

            try {
                const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ nickname, score }) });
                const data = await res.json();
                document.getElementById('final-stats').innerText = `${nickname} 병사 전적: ${score}pt\n인류 총합 공헌도: ${data.total} / ${TOTAL_GOAL}pt`;
                let p = Math.min(100, Math.round((data.total/TOTAL_GOAL)*100));
                setTimeout(() => { 
                    const pb = document.getElementById('total-progress');
                    pb.style.width = p + '%'; pb.innerText = p + '% 달성'; 
                }, 100);
            } catch(e) { document.getElementById('final-stats').innerText += "\n(서버 연결 실패)"; }
        }

        async function fetchAndShowRanking() {
            const btn = document.getElementById('btn-rank'); btn.innerText = "조회 중...";
            try {
                const res = await fetch(SCRIPT_URL); const data = await res.json();
                const list = document.getElementById('ranking-list'); list.innerHTML = "";
                data.ranks.slice(0, 10).forEach((item, i) => {
                    list.innerHTML += `<div style="display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid #444;"><span>${i+1}. ${item.name}</span><span style="color:var(--gold)">${item.score}pt</span></div>`;
                });
                document.getElementById('ranking-board').style.display = 'block'; btn.style.display = 'none';
            } catch(e) { btn.innerText = "조회 실패"; }
        }
    </script>
</body>
</html>
